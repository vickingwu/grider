# fly.toml app configuration file generated for grider on 2026-01-10T02:55:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'grider'
primary_region = 'sin'

[build]

[[mounts]]
  source = 'cache'
  destination = '/app/backend/cache'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
